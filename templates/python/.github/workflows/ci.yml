name: CI

# The non-skippable backstop for the Verify phase. Local pre-commit
# hooks and /review-check can be bypassed (--no-verify, forgetting to
# run them); this runs on every pull request and cannot be skipped.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type-check (mypy)
        run: uv run mypy src/

      - name: Tests (pytest)
        run: uv run pytest
